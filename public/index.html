<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1A1D23">
  <title>Goals</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg1: #1A1D23;
      --bg2: #12141A;
      --cream: #E8D5B5;
      --cream10: rgba(232,213,181,0.1);
      --cream35: rgba(232,213,181,0.35);
      --cream25: rgba(232,213,181,0.25);
      --cream40: rgba(232,213,181,0.4);
      --cream50: rgba(232,213,181,0.5);
      --white04: rgba(255,255,255,0.04);
      --white06: rgba(255,255,255,0.06);
      --white08: rgba(255,255,255,0.08);
      --white10: rgba(255,255,255,0.1);
      --white15: rgba(255,255,255,0.15);
      --green: #4A8C5C;
      --green60: rgba(74,140,92,0.6);
      --red: #E86A4B;
      --yellow: #D4A843;
      --blue: #6A9BC4;
      --font-body: 'DM Sans', 'Helvetica Neue', sans-serif;
      --font-mono: 'DM Mono', 'Courier New', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { 
      background: var(--bg1); color: var(--cream); font-family: var(--font-body);
      min-height: 100vh; min-height: 100dvh;
      overscroll-behavior: none;
    }
    body { 
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    #app { max-width: 520px; margin: 0 auto; min-height: 100vh; min-height: 100dvh; }
    
    .header {
      padding: 20px 20px 0; position: sticky; top: 0; z-index: 10;
      background: linear-gradient(180deg, var(--bg1) 88%, transparent);
      padding-bottom: 16px;
    }
    .header-row { display: flex; justify-content: space-between; align-items: flex-start; }
    .title { font-size: 26px; font-family: var(--font-mono); font-weight: 500; letter-spacing: 4px; }
    .subtitle { font-size: 11px; color: var(--cream35); font-family: var(--font-mono); letter-spacing: 1px; margin-top: 3px; }
    .countdown { text-align: right; display: flex; align-items: baseline; gap: 5px; }
    .countdown-num { font-size: 32px; font-family: var(--font-mono); font-weight: 500; line-height: 1; }
    .countdown-lbl { font-size: 9px; color: var(--cream35); white-space: pre-line; line-height: 1.3; font-family: var(--font-mono); }

    .stats-row { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; }
    .stat-box { display: flex; flex-direction: column; align-items: center; }
    .stat-label { font-size: 9px; color: var(--cream35); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-size: 22px; font-family: var(--font-mono); font-weight: 500; }
    .stat-target { font-size: 11px; color: var(--green60); font-family: var(--font-mono); margin-top: 2px; }

    .tabs { display: flex; gap: 2px; margin-top: 14px; background: var(--white04); border-radius: 8px; padding: 3px; }
    .tab { flex: 1; padding: 7px 0; background: none; border: none; color: var(--cream35); font-size: 13px; font-family: var(--font-body); cursor: pointer; border-radius: 6px; }
    .tab.active { background: var(--cream10); color: var(--cream); font-weight: 500; }

    .body { padding: 6px 20px 40px; }

    .week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .nav-btn { width: 34px; height: 34px; border-radius: 8px; background: var(--white04); border: 1px solid rgba(255,255,255,0.07); color: var(--cream); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .nav-btn:disabled { opacity: 0.3; }
    .week-center { text-align: center; }
    .week-title { display: block; font-size: 15px; font-weight: 500; }
    .week-range { display: block; font-size: 11px; color: var(--cream35); font-family: var(--font-mono); margin-top: 2px; }

    .week-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .week-bar-bg { flex: 1; height: 3px; background: var(--white06); border-radius: 2px; overflow: hidden; }
    .week-bar-fill { height: 100%; background: var(--cream); border-radius: 2px; transition: width 0.4s; }
    .week-bar-label { font-size: 11px; font-family: var(--font-mono); color: var(--cream40); min-width: 34px; text-align: right; }

    .cards { display: flex; flex-direction: column; gap: 8px; }
    .card { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 12px 14px; border-left: 3px solid; }
    .card-top { display: flex; align-items: center; gap: 10px; }
    .card-icon { font-size: 18px; flex-shrink: 0; }
    .card-text { flex: 1; min-width: 0; }
    .card-name { display: block; font-size: 14px; font-weight: 500; transition: all 0.2s; }
    .card-name.done { opacity: 0.5; text-decoration: line-through; }
    .card-note { display: block; font-size: 10px; color: rgba(232,213,181,0.3); margin-top: 1px; }
    .card-count { font-size: 14px; font-family: var(--font-mono); font-weight: 500; flex-shrink: 0; }

    .check-row { display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
    .check-item { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .check-label { font-size: 9px; color: var(--cream25); font-family: var(--font-mono); }

    .checkbox {
      width: 28px; height: 28px; border-radius: 6px; border: 2px solid var(--white15);
      background: rgba(255,255,255,0.03); cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: all 0.15s ease; padding: 0;
    }
    .checkbox.checked { border: none; }
    .checkbox svg { display: none; }
    .checkbox.checked svg { display: block; }

    .weight-done { display: flex; align-items: center; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
    .weight-val { font-size: 18px; font-family: var(--font-mono); font-weight: 500; }
    .weight-delta { font-size: 11px; font-family: var(--font-mono); }
    .weight-clear { font-size: 10px; color: var(--cream25); background: none; border: none; cursor: pointer; text-decoration: underline; }
    .weight-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
    .weight-input { width: 80px; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--white10); background: rgba(255,255,255,0.03); color: var(--cream); font-size: 14px; font-family: var(--font-mono); outline: none; }
    .weight-log { padding: 6px 14px; border-radius: 6px; background: rgba(106,155,196,0.15); border: 1px solid rgba(106,155,196,0.25); color: var(--blue); font-size: 13px; cursor: pointer; font-weight: 500; }

    .section-head { font-size: 11px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 2px; color: var(--cream35); margin: 0 0 14px; }

    .over-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(58px, 1fr)); gap: 6px; }
    .over-col { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 3px; border-radius: 7px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.04); cursor: pointer; }
    .over-col.current { outline: 2px solid var(--cream); }
    .over-col.future { opacity: 0.25; }
    .over-wk { font-size: 9px; font-family: var(--font-mono); color: var(--cream40); }
    .over-bar-bg { width: 14px; height: 46px; background: var(--white04); border-radius: 3px; overflow: hidden; display: flex; flex-direction: column-reverse; }
    .over-bar-fill { width: 100%; border-radius: 3px; transition: height 0.3s; }
    .over-pct { font-size: 9px; font-family: var(--font-mono); color: var(--cream35); }

    .brk-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .brk-icon { font-size: 14px; }
    .brk-label { font-size: 12px; min-width: 110px; }
    .brk-bar-bg { flex: 1; height: 5px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
    .brk-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
    .brk-pct { font-size: 11px; font-family: var(--font-mono); color: var(--cream40); min-width: 32px; text-align: right; }

    .chart-wrap { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 14px; }

    .save-banner { text-align: center; font-size: 10px; color: var(--cream25); padding: 3px 0; font-family: var(--font-mono); }

    .view-section { display: none; }
    .view-section.active { display: block; }

    .milestone-check { 
      width: 28px; height: 28px; border-radius: 7px; border: 2px solid var(--white15);
      display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700;
      color: white; flex-shrink: 0; transition: all 0.2s; background: rgba(255,255,255,0.05);
      cursor: pointer;
    }
    .milestone-check.done { background: var(--green); border-color: var(--green); }
  </style>
</head>
<body>
<div id="app"></div>

<script>
// ── Config ──
const GOALS = [
  { id:"running", label:"Running", icon:"🏃", color:"#E86A4B", phases:[{from:0,to:3,t:1},{from:4,to:99,t:2}], note:"Physio return-to-run plan → 10k by end June" },
  { id:"golf_round", label:"Golf Round", icon:"⛳", color:"#4A8C5C", target:1, note:"1 round per week" },
  { id:"golf_practice", label:"Golf Practice", icon:"🏌️", color:"#6BAF7A", target:2, note:"2 sessions/week (1 can be a lesson)" },
  { id:"weights", label:"Weights", icon:"🏋️", color:"#7B8DBF", target:2, note:"2 sessions per week" },
  { id:"shoulder_mobility", label:"Shoulder Mobility", icon:"🔄", color:"#C4956A", target:3, note:"3 sessions per week" },
  { id:"shin_physio", label:"Shin Physio", icon:"🦵", color:"#B07DAB", target:2, note:"2 sessions per week" },
  { id:"early_start", label:"Early Start (6:30am)", icon:"☀️", color:"#D4A843", target:4, note:"Up by 6:30am, 4 days/week" },
  { id:"flossing", label:"Flossing", icon:"🦷", color:"#5BA8C4", target:3, note:"3 times per week" },
];

const MILESTONES = [
  { id:"ilf_app", label:"Finish ILF / First Loss Scale App", icon:"💻", color:"#8B7EC8" },
  { id:"goal_tracker_app", label:"Build Goal Tracker App", icon:"📱", color:"#8B7EC8", done:true },
  { id:"finance_plan", label:"Savings & Tax Plan with Ellie", icon:"💰", color:"#5BA88C", note:"ISA, pension allowances, wedding buffer" },
  { id:"golf_lessons", label:"Golf Lessons", icon:"📋", color:"#4A8C5C", note:"7 lessons by July", count:7 },
];

const START = new Date(2026, 3, 20);
const END = new Date(2026, 5, 8);
const TOTAL_WEEKS = Math.ceil((END - START) / (7*864e5));
const SKEY = "goals-2026-pwa";

// ── State ──
let state = { weeklyChecks:{}, weights:{}, milestones:{goal_tracker_app:true}, lessonCount:0 };
let selectedWeek = Math.max(0, Math.floor((new Date() - START) / (7*864e5)));
let currentView = "weekly";

function save() { localStorage.setItem(SKEY, JSON.stringify(state)); }
function load() {
  try { const s = localStorage.getItem(SKEY); if(s) state = JSON.parse(s); } catch(e) {}
}

function getTarget(g, w) {
  if(g.phases) { const p = g.phases.find(x => w >= x.from && w <= x.to); return p ? p.t : g.phases[g.phases.length-1].t; }
  return g.target;
}
function getChecks(gId, w) {
  const g = GOALS.find(x=>x.id===gId);
  const t = getTarget(g, w);
  const stored = state.weeklyChecks[w]?.[gId];
  if(Array.isArray(stored)) {
    if(stored.length===t) return stored;
    if(stored.length<t) return [...stored, ...Array(t-stored.length).fill(false)];
    return stored.slice(0,t);
  }
  if(typeof stored==="number") return Array.from({length:t},(_,i)=>i<stored);
  return Array(t).fill(false);
}
function toggleCheck(gId, w, idx) {
  const checks = [...getChecks(gId, w)];
  checks[idx] = !checks[idx];
  if(!state.weeklyChecks[w]) state.weeklyChecks[w] = {};
  state.weeklyChecks[w][gId] = checks;
  save(); render();
}
function doneCount(gId, w) { return getChecks(gId, w).filter(Boolean).length; }

function weekPct(w) {
  let d=0, t=0;
  GOALS.forEach(g => { const tgt=getTarget(g,w); t+=tgt; d+=doneCount(g.id,w); });
  return t>0 ? Math.round(d/t*100) : 0;
}
function overallPct() {
  const cw = Math.max(0, Math.floor((new Date()-START)/(7*864e5)));
  let d=0,t=0;
  for(let w=0;w<=Math.min(cw,TOTAL_WEEKS-1);w++) GOALS.forEach(g=>{const tgt=getTarget(g,w);t+=tgt;d+=doneCount(g.id,w);});
  return t>0?Math.round(d/t*100):0;
}

function fmtDate(d) { return d.toLocaleDateString("en-GB",{day:"numeric",month:"short"}); }
function weekStart(w) { const d=new Date(START); d.setDate(d.getDate()+w*7); return d; }
function weekEnd(w) { const d=weekStart(w); d.setDate(d.getDate()+6); return d; }

function checkboxHTML(checked, color, gId, w, idx) {
  const bg = checked ? color : 'rgba(255,255,255,0.03)';
  const border = checked ? 'none' : '2px solid rgba(255,255,255,0.15)';
  const shadow = checked ? `0 0 8px ${color}33` : 'none';
  const svg = checked ? `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7.5L5.5 11L12 3" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>` : '';
  return `<button class="checkbox${checked?' checked':''}" style="background:${bg};border:${border};box-shadow:${shadow}" onclick="toggleCheck('${gId}',${w},${idx})">${svg}</button>`;
}

// ── Render ──
function render() {
  const cw = Math.max(0, Math.floor((new Date()-START)/(7*864e5)));
  const daysLeft = Math.max(0, Math.ceil((END-new Date())/864e5));
  const op = overallPct();
  const wp = weekPct(selectedWeek);
  const latestWeight = state.weights[cw] || state.weights[Math.max(0,cw-1)] || 82;

  let html = `
    <div class="header">
      <div class="header-row">
        <div><h1 class="title">GOALS</h1><p class="subtitle">21 Apr – 8 Jun 2026</p></div>
        <div class="countdown"><span class="countdown-num">${daysLeft}</span><span class="countdown-lbl">days to\nFidelis</span></div>
      </div>
      <div class="stats-row">
        <div class="stat-box">
          <svg viewBox="0 0 80 80" width="64" height="64">
            <circle cx="40" cy="40" r="34" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="5"/>
            <circle cx="40" cy="40" r="34" fill="none" stroke="#E8D5B5" stroke-width="5" stroke-linecap="round"
              stroke-dasharray="${op*2.136} 213.6" transform="rotate(-90 40 40)"/>
            <text x="40" y="37" text-anchor="middle" fill="#E8D5B5" font-size="16" font-weight="500" font-family="var(--font-mono)">${op}%</text>
            <text x="40" y="50" text-anchor="middle" fill="rgba(232,213,181,0.4)" font-size="8" font-family="var(--font-mono)">overall</text>
          </svg>
        </div>
        <div class="stat-box">
          <span class="stat-label">Weight</span>
          <span class="stat-value">${latestWeight}kg</span>
          <span class="stat-target">target 80kg</span>
        </div>
      </div>
      <div class="tabs">
        <button class="tab${currentView==='weekly'?' active':''}" onclick="switchView('weekly')">Weekly</button>
        <button class="tab${currentView==='overview'?' active':''}" onclick="switchView('overview')">Overview</button>
        <button class="tab${currentView==='milestones'?' active':''}" onclick="switchView('milestones')">Milestones</button>
      </div>
    </div>`;

  // ── Weekly View ──
  html += `<div class="body view-section${currentView==='weekly'?' active':''}">
    <div class="week-nav">
      <button class="nav-btn" onclick="changeWeek(-1)"${selectedWeek===0?' disabled':''}>◀</button>
      <div class="week-center">
        <span class="week-title">Week ${selectedWeek+1}${selectedWeek===cw?' · now':''}</span>
        <span class="week-range">${fmtDate(weekStart(selectedWeek))} – ${fmtDate(weekEnd(selectedWeek))}</span>
      </div>
      <button class="nav-btn" onclick="changeWeek(1)"${selectedWeek>=TOTAL_WEEKS-1?' disabled':''}>▶</button>
    </div>
    <div class="week-bar"><div class="week-bar-bg"><div class="week-bar-fill" style="width:${wp}%"></div></div><span class="week-bar-label">${wp}%</span></div>
    <div class="cards">`;

  GOALS.forEach(g => {
    const t = getTarget(g, selectedWeek);
    const checks = getChecks(g.id, selectedWeek);
    const done = checks.filter(Boolean).length;
    const allDone = done >= t;
    html += `<div class="card" style="border-left-color:${g.color}">
      <div class="card-top">
        <span class="card-icon">${g.icon}</span>
        <div class="card-text"><span class="card-name${allDone?' done':''}">${g.label}</span><span class="card-note">${g.note}</span></div>
        <span class="card-count" style="color:${allDone?'#4A8C5C':'rgba(232,213,181,0.35)'}">${done}/${t}</span>
      </div>
      <div class="check-row">
        ${checks.map((c,i) => `<div class="check-item">${checkboxHTML(c,g.color,g.id,selectedWeek,i)}<span class="check-label">#${i+1}</span></div>`).join('')}
      </div>
    </div>`;
  });

  // Weight card
  const wVal = state.weights[selectedWeek];
  html += `<div class="card" style="border-left-color:#6A9BC4">
    <div class="card-top"><span class="card-icon">⚖️</span><div class="card-text"><span class="card-name">Weekly Weigh-in</span></div></div>`;
  if(wVal != null) {
    const delta = wVal - 80;
    html += `<div class="weight-done">
      <span class="weight-val">${wVal}kg</span>
      <span class="weight-delta" style="color:${wVal<=80?'#4A8C5C':'rgba(232,213,181,0.45)'}">${wVal<=80?'Target reached!':`${delta.toFixed(1)}kg to go`}</span>
      <button class="weight-clear" onclick="clearWeight(${selectedWeek})">clear</button>
    </div>`;
  } else {
    html += `<div class="weight-row">
      <input type="number" step="0.1" placeholder="e.g. 81.2" class="weight-input" id="weightIn" onkeydown="if(event.key==='Enter')logWeight(${selectedWeek})">
      <button class="weight-log" onclick="logWeight(${selectedWeek})">Log</button>
    </div>`;
  }
  html += `</div></div></div>`;

  // ── Overview View ──
  html += `<div class="body view-section${currentView==='overview'?' active':''}">
    <p class="section-head">Weekly completion</p>
    <div class="over-grid">`;
  for(let w=0;w<TOTAL_WEEKS;w++) {
    const pct = weekPct(w);
    const col = pct>=80?'#4A8C5C':pct>=50?'#D4A843':pct>0?'#E86A4B':'transparent';
    html += `<button class="over-col${w===cw?' current':''}${w>cw?' future':''}" onclick="selectedWeek=${w};currentView='weekly';render()">
      <span class="over-wk">W${w+1}</span>
      <div class="over-bar-bg"><div class="over-bar-fill" style="height:${pct}%;background:${col}"></div></div>
      <span class="over-pct">${pct}%</span>
    </button>`;
  }
  html += `</div><p class="section-head" style="margin-top:28px">Per goal</p>`;
  GOALS.forEach(g => {
    let td=0,tt=0;
    for(let w=0;w<=Math.min(cw,TOTAL_WEEKS-1);w++){const t=getTarget(g,w);tt+=t;td+=doneCount(g.id,w);}
    const pct=tt>0?Math.round(td/tt*100):0;
    html += `<div class="brk-row"><span class="brk-icon">${g.icon}</span><span class="brk-label">${g.label}</span><div class="brk-bar-bg"><div class="brk-bar-fill" style="width:${pct}%;background:${g.color}"></div></div><span class="brk-pct">${pct}%</span></div>`;
  });

  // Weight chart
  html += `<p class="section-head" style="margin-top:28px">Weight trend</p><div class="chart-wrap"><svg viewBox="0 0 560 180" style="width:100%;height:160px">
    <line x1="0" y1="${150-((80-78)/6)*150}" x2="560" y2="${150-((80-78)/6)*150}" stroke="rgba(74,140,92,0.35)" stroke-width="1" stroke-dasharray="5 4"/>
    <text x="550" y="${145-((80-78)/6)*150}" text-anchor="end" fill="rgba(74,140,92,0.5)" font-size="10" font-family="monospace">80kg</text>
    <line x1="0" y1="${150-((82-78)/6)*150}" x2="560" y2="${150-((82-78)/6)*150}" stroke="rgba(232,213,181,0.1)" stroke-width="1" stroke-dasharray="4 4"/>`;
  const wEntries = Object.entries(state.weights).sort((a,b)=>+a[0]-+b[0]);
  if(!wEntries.length) {
    html += `<text x="280" y="90" text-anchor="middle" fill="rgba(232,213,181,0.25)" font-size="13">No weigh-ins yet</text>`;
  } else {
    const pts = wEntries.map(([w,v])=>({x:(+w/Math.max(TOTAL_WEEKS-1,1))*520+20, y:150-((v-78)/6)*150, v}));
    if(pts.length>1) html += `<polyline fill="none" stroke="#6A9BC4" stroke-width="2" stroke-linejoin="round" points="${pts.map(p=>`${p.x},${p.y}`).join(' ')}"/>`;
    pts.forEach(p => { html += `<circle cx="${p.x}" cy="${p.y}" r="4.5" fill="#6A9BC4"/><text x="${p.x}" y="${p.y-10}" text-anchor="middle" fill="#E8D5B5" font-size="10" font-family="monospace">${p.v}</text>`; });
  }
  html += `</svg></div></div>`;

  // ── Milestones View ──
  html += `<div class="body view-section${currentView==='milestones'?' active':''}">
    <p class="section-head">Milestones</p>`;
  MILESTONES.forEach(m => {
    if(m.count) {
      const c = state.lessonCount || 0;
      html += `<div class="card" style="border-left-color:${m.color}">
        <div class="card-top"><span class="card-icon">${m.icon}</span><div class="card-text"><span class="card-name">${m.label}</span><span class="card-note">${m.note}</span></div><span class="card-count" style="color:${m.color}">${c}/7</span></div>
        <div class="check-row">${Array.from({length:7},(_,i)=>{
          const checked = i<c;
          const bg = checked?m.color:'rgba(255,255,255,0.03)';
          const border = checked?'none':'2px solid rgba(255,255,255,0.15)';
          return `<div class="check-item"><button class="checkbox${checked?' checked':''}" style="background:${bg};border:${border}" onclick="setLessons(${i<c?i:i+1})">${checked?'<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7.5L5.5 11L12 3" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</button><span class="check-label">#${i+1}</span></div>`;
        }).join('')}</div></div>`;
    } else {
      const done = state.milestones[m.id] || m.done;
      html += `<div class="card" style="border-left-color:${m.color};opacity:${done?0.6:1};cursor:pointer" onclick="toggleMilestone('${m.id}')">
        <div class="card-top">
          <div class="milestone-check${done?' done':''}">${done?'✓':''}</div>
          <div class="card-text" style="margin-left:4px"><span class="card-name" style="${done?'text-decoration:line-through':''}">${m.label}</span>${m.note?`<span class="card-note">${m.note}</span>`:''}</div>
        </div></div>`;
    }
  });
  html += `</div>`;

  document.getElementById('app').innerHTML = html;
}

// ── Global actions ──
window.switchView = v => { currentView = v; render(); };
window.changeWeek = d => { selectedWeek = Math.max(0, Math.min(TOTAL_WEEKS-1, selectedWeek+d)); render(); };
window.toggleCheck = toggleCheck;
window.logWeight = w => {
  const el = document.getElementById('weightIn');
  const v = parseFloat(el?.value);
  if(isNaN(v)||v<50||v>150) return;
  state.weights[w] = v; save(); render();
};
window.clearWeight = w => { delete state.weights[w]; save(); render(); };
window.toggleMilestone = id => { state.milestones[id] = !state.milestones[id]; save(); render(); };
window.setLessons = n => { state.lessonCount = Math.max(0, Math.min(7, n)); save(); render(); };

// ── Init ──
load();
render();

// Register service worker
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
</script>
</body>
</html>
